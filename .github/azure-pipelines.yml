trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - script: |
      echo "sdk.dir=$ANDROID_SDK_ROOT" > NeuralBridge_mcp/android/local.properties
      echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> NeuralBridge_mcp/android/local.properties
    displayName: 'Set SDK path'

  - task: Gradle@3
    inputs:
      workingDirectory: 'NeuralBridge_mcp/android'
      gradleWrapperFile: 'NeuralBridge_mcp/android/gradlew'
      gradleOptions: '-Xmx3072m'
      publishJUnitResults: false
      testResultsFiles: '**/TEST-*.xml'
      tasks: 'assembleDebug'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: 'NeuralBridge_mcp/android/app/build/outputs/apk/debug/app-debug.apk'
      artifactName: 'NeuralBridge-APK'