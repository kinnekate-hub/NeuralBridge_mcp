name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the Code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Find and Run Gradle
      run: |
        # Automatically hunt down the gradlew script no matter what folder it is in
        GRADLE_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
        echo "Found gradlew inside: $GRADLE_DIR"
        cd $GRADLE_DIR
        
        # Unlock and build the app
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload the Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        # The wildcard catches the APK regardless of folder depth
        path: '**/*.apk'
