version: 2
updates:
  # Rust / Cargo
  - package-ecosystem: cargo
    directory: /mcp-server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Android / Gradle
  - package-ecosystem: gradle
    directory: /companion-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Python
  - package-ecosystem: pip
    directory: /python-demo
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
