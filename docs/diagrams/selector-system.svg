<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" fill="none">
  <defs>
    <linearGradient id="ssInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="ssFound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="ssShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" rx="16" fill="#FAFBFC"/>

  <!-- Input -->
  <rect x="30" y="20" width="250" height="60" rx="12" fill="url(#ssInput)" filter="url(#ssShadow)"/>
  <text x="155" y="44" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" fill-opacity="0.8">Agent says</text>
  <rect x="50" y="50" width="210" height="24" rx="4" fill="white" fill-opacity="0.15"/>
  <text x="155" y="67" text-anchor="middle" fill="white" font-family="ui-monospace, monospace" font-size="12" font-weight="600">tap(text="Login")</text>

  <!-- Arrow to chain -->
  <line x1="280" y1="50" x2="320" y2="50" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="316,45 326,50 316,55" fill="#CBD5E1"/>

  <!-- Priority chain title -->
  <text x="610" y="25" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Semantic Engine tries in order</text>

  <!-- Step 1 -->
  <rect x="330" y="20" width="540" height="42" rx="8" fill="white" stroke="#A7F3D0" stroke-width="2" filter="url(#ssShadow)"/>
  <rect x="338" y="27" width="24" height="24" rx="12" fill="#10B981"/>
  <text x="350" y="44" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">1</text>
  <text x="375" y="46" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Exact text match</text>
  <rect x="530" y="30" width="220" height="22" rx="4" fill="#1E293B"/>
  <text x="640" y="45" text-anchor="middle" fill="#A5B4FC" font-family="ui-monospace, monospace" font-size="10">"Login" == "Login"</text>
  <rect x="790" y="30" width="66" height="22" rx="11" fill="#D1FAE5"/>
  <text x="823" y="45" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Found!</text>

  <!-- Step 2 -->
  <rect x="330" y="72" width="540" height="42" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#ssShadow)"/>
  <rect x="338" y="79" width="24" height="24" rx="12" fill="#94A3B8"/>
  <text x="350" y="96" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">2</text>
  <text x="375" y="98" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Partial text match</text>
  <rect x="530" y="82" width="220" height="22" rx="4" fill="#F1F5F9"/>
  <text x="640" y="97" text-anchor="middle" fill="#64748B" font-family="ui-monospace, monospace" font-size="10">"Login" in "Login Now"</text>

  <!-- Step 3 -->
  <rect x="330" y="124" width="540" height="42" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#ssShadow)"/>
  <rect x="338" y="131" width="24" height="24" rx="12" fill="#94A3B8"/>
  <text x="350" y="148" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">3</text>
  <text x="375" y="150" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Content description</text>
  <rect x="530" y="134" width="220" height="22" rx="4" fill="#F1F5F9"/>
  <text x="640" y="149" text-anchor="middle" fill="#64748B" font-family="ui-monospace, monospace" font-size="10">contentDesc == "Login"</text>

  <!-- Step 4 -->
  <rect x="330" y="176" width="540" height="42" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#ssShadow)"/>
  <rect x="338" y="183" width="24" height="24" rx="12" fill="#94A3B8"/>
  <text x="350" y="200" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">4</text>
  <text x="375" y="202" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Resource ID (suffix)</text>
  <rect x="530" y="186" width="220" height="22" rx="4" fill="#F1F5F9"/>
  <text x="640" y="201" text-anchor="middle" fill="#64748B" font-family="ui-monospace, monospace" font-size="10">id ends with "login_button"</text>

  <!-- Step 5 -->
  <rect x="330" y="228" width="540" height="42" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#ssShadow)"/>
  <rect x="338" y="235" width="24" height="24" rx="12" fill="#94A3B8"/>
  <text x="350" y="252" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">5</text>
  <text x="375" y="254" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Combined (AND logic)</text>
  <rect x="530" y="238" width="280" height="22" rx="4" fill="#F1F5F9"/>
  <text x="670" y="253" text-anchor="middle" fill="#64748B" font-family="ui-monospace, monospace" font-size="10">text="Login" AND class="Button"</text>

  <!-- Step 6 -->
  <rect x="330" y="280" width="540" height="42" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#ssShadow)"/>
  <rect x="338" y="287" width="24" height="24" rx="12" fill="#94A3B8"/>
  <text x="350" y="304" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="700">6</text>
  <text x="375" y="306" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Fuzzy match</text>
  <rect x="530" y="290" width="280" height="22" rx="4" fill="#F1F5F9"/>
  <text x="670" y="305" text-anchor="middle" fill="#64748B" font-family="ui-monospace, monospace" font-size="10">Levenshtein("Login", "Logn") &lt; 3</text>

  <!-- Tiebreaker note -->
  <rect x="30" y="332" width="840" height="24" rx="12" fill="#F1F5F9"/>
  <text x="450" y="348" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Multiple matches? Prefer: <tspan font-weight="700" fill="#4F46E5">visible</tspan> &#8594; <tspan font-weight="700" fill="#4F46E5">interactive</tspan> &#8594; <tspan font-weight="700" fill="#4F46E5">center-positioned</tspan></text>
</svg>
