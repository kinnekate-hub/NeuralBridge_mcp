  <rect x="422" y="272" width="90" height="26" rx="5" fill="#FEF3C7"/>
  <text x="467" y="289" text-anchor="middle" fill="#78350F" font-family="system-ui, sans-serif" font-size="10">UIAutomator</text>
  <text x="520" y="289" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="532" y="272" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="562" y="289" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Device</text>

  <rect x="720" y="264" width="130" height="36" rx="18" fill="#FEFCE8"/>
  <text x="785" y="287" text-anchor="middle" fill="#CA8A04" font-family="system-ui, sans-serif" font-size="14" font-weight="800">500-2000ms</text>

  <!-- Row 4: droidrun -->
  <rect x="30" y="325" width="840" height="74" rx="10" fill="white" stroke="#C7D2FE" stroke-width="1" filter="url(#wfShadow)"/>
  <rect x="30" y="325" width="6" height="74" rx="3" fill="#818CF8"/>

