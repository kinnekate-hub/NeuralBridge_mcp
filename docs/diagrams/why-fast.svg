  <rect x="30" y="235" width="6" height="74" rx="3" fill="#EAB308"/>

  <text x="52" y="258" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">mobile-mcp / ADB Shell</text>
