  <text x="277" y="261" text-anchor="middle" fill="#A16207" font-family="system-ui, sans-serif" font-size="10" font-weight="700">ADB-bound</text>

  <rect x="52" y="272" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="82" y="289" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Agent</text>
  <text x="120" y="289" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="132" y="272" width="80" height="26" rx="5" fill="#FEF3C7"/>
  <text x="172" y="289" text-anchor="middle" fill="#78350F" font-family="system-ui, sans-serif" font-size="10">MCP stdio</text>
  <text x="220" y="289" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="232" y="272" width="50" height="26" rx="5" fill="#FEF3C7"/>
  <text x="257" y="289" text-anchor="middle" fill="#78350F" font-family="system-ui, sans-serif" font-size="10">ADB</text>
  <text x="290" y="289" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="302" y="272" width="100" height="26" rx="5" fill="#FEF3C7"/>
  <text x="352" y="289" text-anchor="middle" fill="#78350F" font-family="system-ui, sans-serif" font-size="10">spawn process</text>
