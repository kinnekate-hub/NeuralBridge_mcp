  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Why NeuralBridge is faster</text>

  <!-- Row 1: Appium (slowest) -->
  <rect x="30" y="55" width="840" height="74" rx="10" fill="white" stroke="#FEE2E2" stroke-width="1" filter="url(#wfShadow)"/>
  <rect x="30" y="55" width="6" height="74" rx="3" fill="#EF4444"/>

  <text x="52" y="78" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Appium</text>
  <rect x="110" y="67" width="68" height="20" rx="10" fill="#FEE2E2"/>
  <text x="144" y="81" text-anchor="middle" fill="#DC2626" font-family="system-ui, sans-serif" font-size="10" font-weight="700">5 hops</text>
  <text x="190" y="78" fill="#DC2626" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Slowest</text>

  <!-- Appium pipeline -->
  <rect x="52" y="92" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="82" y="109" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Agent</text>
  <text x="120" y="109" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="132" y="92" width="60" height="26" rx="5" fill="#FEE2E2"/>
  <text x="162" y="109" text-anchor="middle" fill="#991B1B" font-family="system-ui, sans-serif" font-size="10">HTTP</text>
  <text x="200" y="109" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="212" y="92" width="100" height="26" rx="5" fill="#FEE2E2"/>
  <text x="262" y="109" text-anchor="middle" fill="#991B1B" font-family="system-ui, sans-serif" font-size="10">Appium Server</text>
  <text x="320" y="109" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="332" y="92" width="50" height="26" rx="5" fill="#FEE2E2"/>
  <text x="357" y="109" text-anchor="middle" fill="#991B1B" font-family="system-ui, sans-serif" font-size="10">ADB</text>
  <text x="390" y="109" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="402" y="92" width="100" height="26" rx="5" fill="#FEE2E2"/>
  <text x="452" y="109" text-anchor="middle" fill="#991B1B" font-family="system-ui, sans-serif" font-size="10">UIAutomator2</text>
  <text x="510" y="109" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="522" y="92" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="552" y="109" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Device</text>

  <rect x="720" y="84" width="130" height="36" rx="18" fill="#FEF2F2"/>
  <text x="785" y="107" text-anchor="middle" fill="#DC2626" font-family="system-ui, sans-serif" font-size="14" font-weight="800">300-1000ms</text>

  <!-- Row 2: Maestro -->
  <rect x="30" y="145" width="840" height="74" rx="10" fill="white" stroke="#FED7AA" stroke-width="1" filter="url(#wfShadow)"/>
