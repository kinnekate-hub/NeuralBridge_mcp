  <text x="152" y="171" text-anchor="middle" fill="#C2410C" font-family="system-ui, sans-serif" font-size="10" font-weight="700">3 hops</text>

  <rect x="52" y="182" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="82" y="199" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Agent</text>
  <text x="120" y="199" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="132" y="182" width="60" height="26" rx="5" fill="#FED7AA"/>
  <text x="162" y="199" text-anchor="middle" fill="#7C2D12" font-family="system-ui, sans-serif" font-size="10">gRPC</text>
  <text x="200" y="199" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="212" y="182" width="120" height="26" rx="5" fill="#FED7AA"/>
  <text x="272" y="199" text-anchor="middle" fill="#7C2D12" font-family="system-ui, sans-serif" font-size="10">On-device server</text>
  <text x="340" y="199" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="352" y="182" width="90" height="26" rx="5" fill="#FED7AA"/>
  <text x="397" y="199" text-anchor="middle" fill="#7C2D12" font-family="system-ui, sans-serif" font-size="10">UIAutomator</text>
  <text x="450" y="199" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="462" y="182" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="492" y="199" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Device</text>

  <rect x="720" y="174" width="130" height="36" rx="18" fill="#FFF7ED"/>
  <text x="785" y="197" text-anchor="middle" fill="#EA580C" font-family="system-ui, sans-serif" font-size="14" font-weight="800">200-500ms</text>

