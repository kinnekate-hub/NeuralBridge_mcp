  <text x="188" y="351" text-anchor="middle" fill="#4338CA" font-family="system-ui, sans-serif" font-size="10" font-weight="700">On-device, ADB transport</text>

  <rect x="52" y="362" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="82" y="379" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Agent</text>
  <text x="120" y="379" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="132" y="362" width="90" height="26" rx="5" fill="#E0E7FF"/>
  <text x="177" y="379" text-anchor="middle" fill="#3730A3" font-family="system-ui, sans-serif" font-size="10">ADB forward</text>
  <text x="230" y="379" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="242" y="362" width="50" height="26" rx="5" fill="#E0E7FF"/>
  <text x="267" y="379" text-anchor="middle" fill="#3730A3" font-family="system-ui, sans-serif" font-size="10">TCP</text>
  <text x="300" y="379" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="312" y="362" width="100" height="26" rx="5" fill="#E0E7FF"/>
  <text x="362" y="379" text-anchor="middle" fill="#3730A3" font-family="system-ui, sans-serif" font-size="10">Portal App</text>
  <text x="420" y="379" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12">&#8594;</text>
  <rect x="432" y="362" width="60" height="26" rx="5" fill="#F1F5F9"/>
  <text x="462" y="379" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Device</text>

  <rect x="720" y="354" width="130" height="36" rx="18" fill="#EEF2FF"/>
  <text x="785" y="377" text-anchor="middle" fill="#6366F1" font-family="system-ui, sans-serif" font-size="14" font-weight="800">200-500ms</text>

  <!-- Row 5: NeuralBridge (fastest) -->
  <rect x="30" y="415" width="840" height="90" rx="10" fill="white" stroke="#A7F3D0" stroke-width="2" filter="url(#wfShadow)"/>
  <rect x="30" y="415" width="6" height="90" rx="3" fill="#10B981"/>

  <text x="52" y="440" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">NeuralBridge</text>
  <rect x="160" y="428" width="68" height="20" rx="10" fill="#D1FAE5"/>
  <text x="194" y="442" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="10" font-weight="700">1 hop</text>
  <text x="240" y="442" fill="#059669" font-family="system-ui, sans-serif" font-size="11" font-weight="700">Fastest</text>

  <rect x="52" y="458" width="60" height="30" rx="5" fill="#F1F5F9"/>
  <text x="82" y="477" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Agent</text>
  <text x="120" y="477" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14">&#8594;</text>
  <rect x="132" y="458" width="60" height="30" rx="5" fill="#D1FAE5"/>
  <text x="162" y="477" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="11">HTTP</text>
  <text x="200" y="477" fill="#6EE7B7" font-family="system-ui, sans-serif" font-size="14">&#8594;</text>
  <rect x="212" y="458" width="330" height="30" rx="5" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="377" y="477" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Companion App (in-process AccessibilityService)</text>

  <rect x="720" y="448" width="130" height="46" rx="23" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="785" y="477" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="16" font-weight="800">~2ms</text>

  <!-- Annotation -->
  <text x="590" y="478" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="9">No ADB. No IPC. No process spawn.</text>
</svg>
