<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="#FAFBFC"/>

  <!-- YOUR MACHINE section -->
  <rect x="30" y="30" width="320" height="360" rx="12" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="190" y="60" text-anchor="middle" fill="#E0E7FF" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">YOUR MACHINE</text>

  <!-- Agent card -->
  <rect x="50" y="80" width="280" height="290" rx="10" fill="white" filter="url(#shadowSm)"/>
  <text x="190" y="112" text-anchor="middle" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">AI Agent</text>
  <line x1="80" y1="125" x2="300" y2="125" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Agent examples -->
  <rect x="72" y="142" width="236" height="32" rx="6" fill="#F1F5F9"/>
  <text x="190" y="163" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="13">Claude Code</text>

  <rect x="72" y="182" width="236" height="32" rx="6" fill="#F1F5F9"/>
  <text x="190" y="203" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="13">Cursor IDE</text>

  <rect x="72" y="222" width="236" height="32" rx="6" fill="#F1F5F9"/>
  <text x="190" y="243" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="13">Custom Agent</text>

  <!-- Example commands -->
  <rect x="72" y="268" width="236" height="84" rx="6" fill="#1E293B"/>
  <text x="84" y="289" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="11">"tap the login button"</text>
  <text x="84" y="307" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="11">"screenshot the screen"</text>
  <text x="84" y="325" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="11">"type hello world"</text>
  <text x="84" y="343" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="11">"swipe up to scroll"</text>

  <!-- Connection arrow -->
  <line x1="350" y1="210" x2="540" y2="210" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="536,205 546,210 536,215" fill="#94A3B8"/>
  <polygon points="354,205 344,210 354,215" fill="#94A3B8"/>

  <!-- Connection label -->
  <rect x="380" y="180" width="150" height="24" rx="12" fill="#EEF2FF"/>
  <text x="455" y="196" text-anchor="middle" fill="#4F46E5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">MCP over HTTP</text>
  <text x="455" y="240" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="10">port 7474</text>

  <!-- ANDROID DEVICE section -->
  <rect x="550" y="30" width="320" height="360" rx="12" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="710" y="60" text-anchor="middle" fill="#D1FAE5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">ANDROID DEVICE</text>

  <!-- App card -->
  <rect x="570" y="80" width="280" height="290" rx="10" fill="white" filter="url(#shadowSm)"/>
  <text x="710" y="112" text-anchor="middle" fill="#1E293B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">NeuralBridge Companion</text>
  <line x1="600" y1="125" x2="820" y2="125" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Layers -->
  <rect x="590" y="138" width="240" height="34" rx="6" fill="#EEF2FF"/>
  <circle cx="608" cy="155" r="8" fill="#6366F1"/>
  <text x="608" y="159" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" font-weight="700">H</text>
  <text x="625" y="160" fill="#4F46E5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">MCP HTTP Server (Ktor CIO)</text>

  <rect x="590" y="180" width="240" height="34" rx="6" fill="#F0FDF4"/>
  <circle cx="608" cy="197" r="8" fill="#10B981"/>
  <text x="608" y="201" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" font-weight="700">T</text>
  <text x="625" y="202" fill="#059669" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Tool Registry (32 tools)</text>

  <rect x="590" y="222" width="240" height="56" rx="6" fill="#FFF7ED"/>
  <circle cx="608" cy="239" r="8" fill="#F59E0B"/>
  <text x="608" y="243" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" font-weight="700">A</text>
  <text x="625" y="241" fill="#B45309" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">AccessibilityService</text>
  <text x="625" y="257" fill="#92400E" font-family="system-ui, -apple-system, sans-serif" font-size="10">UI tree &middot; Gestures &middot; Events</text>
  <text x="625" y="271" fill="#92400E" font-family="system-ui, -apple-system, sans-serif" font-size="10">In-process, zero IPC</text>

  <rect x="590" y="286" width="240" height="46" rx="6" fill="#FDF2F8"/>
  <circle cx="608" cy="305" r="8" fill="#EC4899"/>
  <text x="608" y="309" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" font-weight="700">S</text>
  <text x="625" y="304" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Screenshot Pipeline</text>
  <text x="625" y="320" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="10">MediaProjection + libjpeg-turbo (JNI)</text>

  <!-- Tech label -->
  <rect x="630" y="342" width="160" height="22" rx="11" fill="#F1F5F9"/>
  <text x="710" y="357" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">Kotlin + C++</text>
</svg>
