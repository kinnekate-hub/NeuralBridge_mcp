<!--
  NeuralBridge Icon Alternatives — Reusable SVG Definitions
  Embed this file or reference defs via <use xlink:href="icons.svg#id">

  Launcher icons: 108×108 viewBox
  Notification icons: 24×24 viewBox, monochrome (white paths, transparent bg)
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
<defs>

  <!-- ══════════════════════════════════════════
       GRADIENTS
  ══════════════════════════════════════════ -->

  <!-- Alt 1: Neural Wave — brand gradient (matches wave-bridge.svg source) -->
  <linearGradient id="grad-nw" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#5E72E4"/>
    <stop offset="100%" stop-color="#825EE4"/>
  </linearGradient>

  <!-- Alt 2: Bridge Signal — ocean-depths gradient (matches ic_launcher_background.xml) -->
  <linearGradient id="grad-bs" x1="0" y1="108" x2="108" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#004D61"/>
    <stop offset="50%"  stop-color="#1A3A6B"/>
    <stop offset="100%" stop-color="#3D5AFE"/>
  </linearGradient>

  <!-- Alt 3: AI Pulse — blue-to-cyan gradient -->
  <linearGradient id="grad-ap" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#5E72E4"/>
    <stop offset="100%" stop-color="#00E5FF"/>
  </linearGradient>

  <!-- Alt 3: radial darkening overlay -->
  <radialGradient id="grad-ap-overlay" cx="54" cy="54" r="54" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#5E72E4" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A1628" stop-opacity="0.45"/>
  </radialGradient>

  <!-- ══════════════════════════════════════════
       FILTERS
  ══════════════════════════════════════════ -->

  <!-- Soft glow for neural nodes -->
  <filter id="f-node-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- Stronger glow for AI core -->
  <filter id="f-core-glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- ══════════════════════════════════════════
       LAUNCHER ICONS (108×108)
  ══════════════════════════════════════════ -->

  <!-- Alt 1: Neural Wave launcher -->
  <symbol id="launcher-neural-wave" viewBox="0 0 108 108">
    <rect width="108" height="108" fill="url(#grad-nw)"/>
    <!-- Background texture circles -->
    <circle cx="90" cy="18" r="36" fill="rgba(255,255,255,0.04)"/>
    <circle cx="18" cy="90" r="28" fill="rgba(0,0,0,0.12)"/>
    <!-- Primary wave — tighter curves -->
    <path d="M 12 52 C 28 38, 46 42, 54 46 C 62 50, 80 56, 96 42"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
    <!-- Secondary wave -->
    <path d="M 12 64 C 28 50, 46 54, 54 58 C 62 62, 80 68, 96 54"
          fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <!-- Support pillars -->
    <line x1="36" y1="46" x2="36" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="72" y1="50" x2="72" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Platform bases -->
    <rect x="28" y="78" width="16" height="4" rx="2" fill="white" opacity="0.7"/>
    <rect x="64" y="78" width="16" height="4" rx="2" fill="white" opacity="0.7"/>
    <!-- Neural nodes (glowing) -->
    <circle cx="36" cy="44" r="5.5" fill="rgba(255,255,255,0.2)" filter="url(#f-node-glow)"/>
    <circle cx="36" cy="44" r="3.5" fill="white"/>
    <circle cx="54" cy="46" r="5.5" fill="rgba(255,255,255,0.2)" filter="url(#f-node-glow)"/>
    <circle cx="54" cy="46" r="3.5" fill="white"/>
    <circle cx="72" cy="48" r="5.5" fill="rgba(255,255,255,0.2)" filter="url(#f-node-glow)"/>
    <circle cx="72" cy="48" r="3.5" fill="white"/>
    <!-- Neural connection lines -->
    <line x1="36" y1="44" x2="54" y2="46" stroke="white" stroke-width="0.8" opacity="0.35"/>
    <line x1="54" y1="46" x2="72" y2="48" stroke="white" stroke-width="0.8" opacity="0.35"/>
    <!-- Accent dots -->
    <circle cx="20" cy="54" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="88" cy="44" r="1.5" fill="white" opacity="0.5"/>
  </symbol>

  <!-- Alt 2: Bridge Signal launcher -->
  <symbol id="launcher-bridge-signal" viewBox="0 0 108 108">
    <rect width="108" height="108" fill="url(#grad-bs)"/>
    <circle cx="80" cy="28" r="50" fill="rgba(61,90,254,0.15)"/>
    <!-- Signal arcs (largest → smallest, bottom-up) -->
    <path d="M 26 52 Q 54 26 82 52" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.30"/>
    <path d="M 32 59 Q 54 36 76 59" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.55"/>
    <path d="M 38 66 Q 54 46 70 66" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.80"/>
    <!-- Signal center dot -->
    <circle cx="54" cy="69" r="4" fill="white"/>
    <!-- Bridge deck -->
    <rect x="14" y="77" width="80" height="5" rx="2.5" fill="white" opacity="0.9"/>
    <!-- Left tower -->
    <rect x="28" y="55" width="6" height="26" rx="2" fill="white" opacity="0.85"/>
    <!-- Right tower -->
    <rect x="74" y="59" width="6" height="22" rx="2" fill="white" opacity="0.85"/>
    <!-- Cable lines -->
    <line x1="31" y1="59" x2="14" y2="77" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="31" y1="59" x2="54" y2="77" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="77" y1="63" x2="54" y2="77" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="77" y1="63" x2="94" y2="77" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Tower caps -->
    <rect x="24" y="53" width="14" height="5" rx="2" fill="white" opacity="0.9"/>
    <rect x="70" y="57" width="14" height="5" rx="2" fill="white" opacity="0.9"/>
    <!-- Ground base -->
    <rect x="10" y="85" width="88" height="4" rx="2" fill="rgba(255,255,255,0.22)"/>
  </symbol>

  <!-- Alt 3: AI Pulse launcher -->
  <symbol id="launcher-ai-pulse" viewBox="0 0 108 108">
    <rect width="108" height="108" fill="url(#grad-ap)"/>
    <rect width="108" height="108" fill="url(#grad-ap-overlay)"/>
    <!-- Concentric pulse rings -->
    <circle cx="54" cy="54" r="38" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <circle cx="54" cy="54" r="28" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
    <circle cx="54" cy="54" r="18" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
    <!-- Neural constellation: center→satellite lines -->
    <line x1="54" y1="54" x2="30" y2="30" stroke="white" stroke-width="1"   opacity="0.4"/>
    <line x1="54" y1="54" x2="78" y2="28" stroke="white" stroke-width="1"   opacity="0.4"/>
    <line x1="54" y1="54" x2="84" y2="54" stroke="white" stroke-width="1"   opacity="0.4"/>
    <line x1="54" y1="54" x2="74" y2="78" stroke="white" stroke-width="1"   opacity="0.4"/>
    <line x1="54" y1="54" x2="34" y2="78" stroke="white" stroke-width="1"   opacity="0.4"/>
    <line x1="54" y1="54" x2="24" y2="54" stroke="white" stroke-width="1"   opacity="0.4"/>
    <!-- Cross-connections -->
    <line x1="30" y1="30" x2="78" y2="28" stroke="white" stroke-width="0.7" opacity="0.2"/>
    <line x1="78" y1="28" x2="84" y2="54" stroke="white" stroke-width="0.7" opacity="0.2"/>
    <line x1="84" y1="54" x2="74" y2="78" stroke="white" stroke-width="0.7" opacity="0.2"/>
    <line x1="24" y1="54" x2="34" y2="78" stroke="white" stroke-width="0.7" opacity="0.2"/>
    <!-- Satellite nodes -->
    <circle cx="30" cy="30" r="4.5" fill="white" filter="url(#f-node-glow)" opacity="0.9"/>
    <circle cx="78" cy="28" r="3.5" fill="white" filter="url(#f-node-glow)" opacity="0.75"/>
    <circle cx="84" cy="54" r="4"   fill="white" filter="url(#f-node-glow)" opacity="0.85"/>
    <circle cx="74" cy="78" r="3.5" fill="white" filter="url(#f-node-glow)" opacity="0.75"/>
    <circle cx="34" cy="78" r="4"   fill="white" filter="url(#f-node-glow)" opacity="0.85"/>
    <circle cx="24" cy="54" r="3.5" fill="white" filter="url(#f-node-glow)" opacity="0.75"/>
    <!-- AI core (center node) -->
    <circle cx="54" cy="54" r="10" fill="rgba(255,255,255,0.18)" filter="url(#f-core-glow)"/>
    <circle cx="54" cy="54" r="7"  fill="white"/>
    <circle cx="54" cy="54" r="3"  fill="url(#grad-ap)"/>
  </symbol>

  <!-- ══════════════════════════════════════════
       NOTIFICATION ICONS (24×24, monochrome)
       All paths use fill/stroke="white"
       Background must be transparent
  ══════════════════════════════════════════ -->

  <!-- Alt 1: Neural Wave notification — single wave arc + 3 nodes -->
  <symbol id="notif-neural-wave" viewBox="0 0 24 24">
    <path d="M 3 12 C 7 8, 11 10, 12 12 C 13 14, 17 16, 21 12"
          fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="7.5"  cy="10.5" r="1.8" fill="white"/>
    <circle cx="12"   cy="12"   r="1.8" fill="white"/>
    <circle cx="16.5" cy="11"   r="1.8" fill="white"/>
  </symbol>

  <!-- Alt 2: Bridge Signal notification — simplified bridge arch + single signal arc -->
  <symbol id="notif-bridge-signal" viewBox="0 0 24 24">
    <!-- Signal arc -->
    <path d="M 7 11 Q 12 6 17 11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <!-- Signal center dot -->
    <circle cx="12" cy="13.5" r="1.6" fill="white"/>
    <!-- Bridge deck -->
    <rect x="3" y="17" width="18" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
    <!-- Left tower -->
    <rect x="7"  y="12.5" width="2" height="5" rx="0.8" fill="white" opacity="0.8"/>
    <!-- Right tower -->
    <rect x="15" y="12.5" width="2" height="5" rx="0.8" fill="white" opacity="0.8"/>
  </symbol>

  <!-- Alt 3: AI Pulse notification — concentric rings + center dot + 4 radiating ticks -->
  <symbol id="notif-ai-pulse" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"   fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <circle cx="12" cy="12" r="5"   fill="none" stroke="white" stroke-width="1.5" opacity="0.75"/>
    <circle cx="12" cy="12" r="2.5" fill="white"/>
    <!-- Radiating ticks (cardinal directions, outside outer ring) -->
    <line x1="12" y1="2"    x2="12" y2="0.5"  stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="22"   x2="12" y2="23.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="2"  y1="12"   x2="0.5" y2="12"  stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="12"   x2="23.5" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </symbol>

</defs>
</svg>
